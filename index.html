<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evaluación de Tracking Visual</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            /* Evita comportamientos extraños de zoom y selección en móviles */
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 10px;
        }
        header {
            text-align: center;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 1.2rem;
            color: #38bdf8;
            margin-bottom: 2px;
        }
        p {
            color: #94a3b8;
            font-size: 0.8rem;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 450px;
            width: 100%;
            align-items: center;
        }
        .canvas-container {
            position: relative;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            width: 100%;
            aspect-ratio: 4 / 3;
            /* Bloquea el scroll de la página al tocar el canvas */
            touch-action: none; 
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #020617;
        }
        .panel {
            background: #1e293b;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .metric-item {
            background: #0f172a;
            padding: 8px;
            border-radius: 8px;
            border-left: 3px solid #38bdf8;
            text-align: center;
        }
        .metric-label {
            font-size: 0.65rem;
            color: #94a3b8;
            text-transform: uppercase;
        }
        .metric-value {
            font-size: 1rem;
            font-weight: bold;
            color: #f8fafc;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            background: #0284c7;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #0369a1;
        }
        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }
        #btnStop {
            background: #475569;
        }
        #btnStop:not(:disabled) {
            background: #e11d48;
        }
        #btnStop:not(:disabled):hover {
            background: #be123c;
        }
        .status-msg {
            font-size: 0.75rem;
            text-align: center;
            color: #fbbf24;
        }
    </style>
</head>
<body>

    <header>
        <h1>Evaluación Visuo-Motora</h1>
        <p>Mantén el punto verde sobre la bolita azul</p>
    </header>

    <div class="container">
        <!-- Pantalla del Test Visual (Área táctil optimizada) -->
        <div class="canvas-container">
            <canvas id="testCanvas" width="400" height="300"></canvas>
        </div>

        <!-- Panel de Control y Métricas Compacto -->
        <div class="panel">
            <div class="metrics-grid">
                <div class="metric-item">
                    <div class="metric-label">Zona Óptima</div>
                    <div class="metric-value" id="lblOptimal">0%</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">Error Prom.</div>
                    <div class="metric-value" id="lblError">0 px</div>
                </div>
                <div class="metric-item">
                    <div class="metric-label">Fatiga</div>
                    <div class="metric-value" id="lblFatigue">0%</div>
                </div>
            </div>

            <div class="status-msg" id="lblStatus">Estado: Listo para iniciar</div>

            <div class="controls">
                <button id="btnStart" onclick="startTest()">Iniciar</button>
                <button id="btnStop" onclick="stopTest()" disabled>Detener</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('testCanvas');
        const ctx = canvas.getContext('2d');
        
        let isRunning = false;
        let animationId;
        let startTime = 0;
        
        let target = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 14,
            speedAngle: 0.035,
            angle: 0,
            radiusX: 130,
            radiusY: 85
        };

        let metrics = {
            totalFrames: 0,
            optimalFrames: 0,
            cumulativeError: 0,
            initialErrorBlock: null,
            finalErrorBlock: null
        };

        // Posición inicial del cursor/dedo al centro
        let gazeX = canvas.width / 2;
        let gazeY = canvas.height / 2;

        function updateTargetPosition() {
            target.angle += target.speedAngle;
            target.x = (canvas.width / 2) + Math.sin(target.angle) * target.radiusX;
            target.y = (canvas.height / 2) + Math.cos(target.angle * 2) * target.radiusY;
        }

        function drawScene() {
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Anillo de tolerancia óptima
            ctx.beginPath();
            ctx.arc(target.x, target.y, 25, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.25)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Target (Azul)
            ctx.beginPath();
            ctx.arc(target.x, target.y, target.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#38bdf8';
            ctx.fill();
            ctx.closePath();

            // Seguimiento del usuario (Verde)
            ctx.beginPath();
            ctx.arc(gazeX, gazeY, 9, 0, Math.PI * 2);
            ctx.fillStyle = '#22c55e';
            ctx.fill();
            ctx.closePath();
        }

        function calculateMetrics() {
            const dx = target.x - gazeX;
            const dy = target.y - gazeY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            metrics.totalFrames++;
            metrics.cumulativeError += distance;

            if (distance <= 25) {
                metrics.optimalFrames++;
            }

            const elapsed = (Date.now() - startTime) / 1000;
            if (elapsed < 3 && metrics.initialErrorBlock === null) {
                metrics.initialErrorBlock = distance;
            }
            if (elapsed > 20 && metrics.finalErrorBlock === null) {
                metrics.finalErrorBlock = distance;
            }

            const optimalPct = ((metrics.optimalFrames / metrics.totalFrames) * 100).toFixed(0);
            const avgError = (metrics.cumulativeError / metrics.totalFrames).toFixed(0);
            
            let fatigueIndex = 0;
            if (metrics.initialErrorBlock && metrics.finalErrorBlock) {
                fatigueIndex = Math.max(0, ((metrics.finalErrorBlock - metrics.initialErrorBlock) / metrics.initialErrorBlock) * 100).toFixed(0);
            }

            document.getElementById('lblOptimal').innerText = optimalPct + '%';
            document.getElementById('lblError').innerText = avgError + 'px';
            document.getElementById('lblFatigue').innerText = fatigueIndex + '%';
        }

        function loop() {
            if (!isRunning) return;
            updateTargetPosition();
            calculateMetrics();
            drawScene();
            animationId = requestAnimationFrame(loop);
        }

        // Manejadores unificados para Mouse y Touch Directo dentro del Canvas
        function handlePointerMove(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            // Escala las coordenadas reales de la pantalla táctil al tamaño interno del canvas (400x300)
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            gazeX = (clientX - rect.left) * scaleX;
            gazeY = (clientY - rect.top) * scaleY;
        }

        canvas.addEventListener('mousemove', (e) => {
            if (isRunning) handlePointerMove(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchmove', (e) => {
            if (isRunning && e.touches.length > 0) {
                handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        canvas.addEventListener('touchstart', (e) => {
            if (isRunning && e.touches.length > 0) {
                handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        function startTest() {
            metrics = { totalFrames: 0, optimalFrames: 0, cumulativeError: 0, initialErrorBlock: null, finalErrorBlock: null };
            startTime = Date.now();
            isRunning = true;
            
            document.getElementById('lblStatus').innerText = 'Estado: En ejecución...';
            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnStop').disabled = false;
            
            loop();
        }

        function stopTest() {
            isRunning = false;
            cancelAnimationFrame(animationId);
            
            document.getElementById('lblStatus').innerText = 'Estado: Prueba finalizada';
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStop').disabled = true;
        }
    </script>
</body>
</html>
